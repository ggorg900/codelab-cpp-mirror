name: codelab-cpp-actions
run-name: ${{ github.actor }} is testing cpp build and execution.
on: [push, workflow_dispatch]

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout
jobs:
  S3_test:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v5
      - name: configure aws credentials
#       uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::728905192898:role/github-oids-role
#         role-session-name: samplerolesession
          aws-region: us-east-1
      # Upload a file to AWS s3
      - name: query s3
        run: |
          aws s3 ls s3://oid-test-bucket
  exercises_sams-teach-urself-cpp:
    needs: [S3_test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: ./build_compile.sh

