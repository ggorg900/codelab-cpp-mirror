name: codelab-cpp-actions
run-name: ${{ github.actor }} is testing cpp build and execution.
on: [push, workflow_dispatch]

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout
jobs:
  S3_test:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v5
      - name: Debug OIDC Token Claims
        run: |
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" ]; then
            TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r .value)
            echo "Token acquired."
            # Decode payload manually (base64url -> base64)
            PAYLOAD=$(echo $TOKEN | cut -d '.' -f 2 | tr '_' '/' | tr '-' '+' | base64 -d 2>/dev/null || echo "Decode failed")
            echo "Decoded payload (partial): $PAYLOAD"  # or pipe to jq if valid JSON
          else
            echo "No ID token request env vars available."      - name: Debug GitHub OIDC Token
      - name: Debug OIDC Token
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r .value)
          echo "Full token (base64): $TOKEN"
          # To see payload: copy the middle part (between . and .) and decode at jwt.io
          # Or install jq + base64 decode if you want in runner        
      - name: configure aws credentials
#       uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
#       uses: aws-actions/configure-aws-credentials@v3
        uses: aws-actions/configure-aws-credentials@v4
        with:
#         role-to-assume: arn:aws:iam::728905192898:role/github-oids-role
          role-to-assume: arn:aws:iam::728905192898:role/GH-OIDC-S3-Access-Role-name
#         role-session-name: samplerolesession
          aws-region: us-east-1
          audience: sts.amazonaws.com
#         audience: sts.us-east-1.amazonaws.com
                
      # Upload a file to AWS s3
      - name: query s3
        run: |
                aws s3 ls s3://oid-test-bucket
  exercises_sams-teach-urself-cpp:
    needs: [S3_test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: ./build_compile.sh

